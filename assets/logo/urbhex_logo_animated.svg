<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- URBHEX animasyonlu logo v1.0 — tarayicida acildiginda oynar (SMIL) -->
  <defs>
    <!-- Sivri tepeli altigen, r=20 -->
    <path id="hex" d="M0,-20 L17.32,-10 L17.32,10 L0,20 L-17.32,10 L-17.32,-10 Z"/>
  </defs>

  <!-- Petek kumesi: merkez + 6 komsu (isi haritasi kimligi) -->
  <g transform="translate(100,100)">
    <!-- merkez: koyu yesil -->
    <use href="#hex" fill="#1B5E20" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" from="0.3" to="1" dur="0.4s" begin="0.1s" fill="freeze"/>
    </use>
    <!-- komsular saat yonunde sirayla belirir -->
    <use href="#hex" transform="translate(0,-34.64)" fill="#2E7D32" opacity="0">
      <animate attributeName="opacity" from="0" to="0.95" dur="0.35s" begin="0.35s" fill="freeze"/>
    </use>
    <use href="#hex" transform="translate(30,-17.32)" fill="#43A047" opacity="0">
      <animate attributeName="opacity" from="0" to="0.95" dur="0.35s" begin="0.5s" fill="freeze"/>
    </use>
    <use href="#hex" transform="translate(30,17.32)" fill="#FFB300" opacity="0">
      <animate attributeName="opacity" from="0" to="0.95" dur="0.35s" begin="0.65s" fill="freeze"/>
    </use>
    <use href="#hex" transform="translate(0,34.64)" fill="#66BB6A" opacity="0">
      <animate attributeName="opacity" from="0" to="0.95" dur="0.35s" begin="0.8s" fill="freeze"/>
    </use>
    <use href="#hex" transform="translate(-30,17.32)" fill="#9CCC65" opacity="0">
      <animate attributeName="opacity" from="0" to="0.95" dur="0.35s" begin="0.95s" fill="freeze"/>
    </use>
    <use href="#hex" transform="translate(-30,-17.32)" fill="#00897B" opacity="0">
      <animate attributeName="opacity" from="0" to="0.95" dur="0.35s" begin="1.1s" fill="freeze"/>
    </use>
    <!-- amber hex'te surekli nabiz: "canli veri" hissi -->
    <use href="#hex" transform="translate(30,17.32)" fill="#FFB300" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="2.4s" begin="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0,0" dur="0.1s" fill="freeze"/>
    </use>
  </g>

  <!-- Kelime marka -->
  <g transform="translate(175,112)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.3s" fill="freeze"/>
    <text font-size="46" font-weight="300" fill="#16302B" letter-spacing="1">urb<tspan font-weight="800" fill="#1B5E20">hex</tspan></text>
    <text y="26" font-size="13" fill="#5C6B63" letter-spacing="4">YAŞANABİLİRLİK ENDEKSİ</text>
  </g>
</svg>
