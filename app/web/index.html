    <h1>Urbhex — Mahalle Güvenlik Haritası ve Yaşanabilirlik Endeksi</h1>
    <p>Taşınmadan, ev almadan veya kiralamadan önce mahallenin güvenlik
    skorunu görün. Urbhex; hırsızlık, gasp, trafik kazası ve diğer asayiş

    <h2>Urbhex — Global Crime Map &amp; Neighborhood Safety Score</h2>
    <p>Check how safe a neighborhood is before you move, rent or buy — anywhere
    in the world. Urbhex collects published local news about crime and traffic
    incidents (theft, robbery, assault, accidents), maps every event street by
    street on a hexagonal grid, and turns it into a 1-100 safety score with a

    coverage. A free, real-time crime heatmap and area safety check for Turkey,
    the United States, Europe and major cities worldwide.</p>
