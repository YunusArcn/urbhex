name: urbhex
description: Harita tabanli asayis ve yasanabilirlik endeksi (Faz 1 - Izmit MVP)
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2      # acik kaynak harita motoru (OSM tile, token gerekmez)
  latlong2: ^0.9.1
  supabase_flutter: ^2.5.6
  geolocator: ^13.0.1      # tarayici/cihaz konumu (haritanin acilis merkezi)
  url_launcher: ^6.3.0     # haber kaynagi linklerini acma
  http: ^1.2.2             # bolge tarama / oneri / olanak istekleri
  shared_preferences: ^2.3.2  # ilk-ziyaret ve amac tercihi (onboarding)

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
